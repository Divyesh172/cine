run:
  timeout: 5m

# Uses golangci-lint's default linters:
# errcheck, gosimple, govet, ineffassign, staticcheck, unused.
# revive is intentionally NOT enabled — its doc-comment rules are too noisy here.

issues:
  exclude-rules:
    # Ignoring the error from Close() (especially in defer) is acceptable.
    - linters:
        - errcheck
      text: '`.*\.Close` is not checked'
